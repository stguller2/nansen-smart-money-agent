name: 🚀 Nansen Smart Money Agent

on:
  schedule:
    # Her 30 dakikada bir otomatik çalışır
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Kullanıcının GitHub'dan eliyle "Çalıştır" butonuna basmasına da izin verir

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  run-agent:
    name: Run Poller
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (for Nansen CLI)
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: ⚡ Install Nansen CLI
        run: npm install -g nansen-cli

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📚 Install Python Dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run Smart Money Agent (DEMO MODE)
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          NANSEN_API_KEY: ${{ secrets.NANSEN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Yarışma Jürisi ve Dışarıdan Katılanlar için API Kredisiz DEMO tetikleyici
          python main.py --demo --once

      - name: 🌍 Deploy Live Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .  
          keep_files: true
